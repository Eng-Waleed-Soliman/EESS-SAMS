{% extends 'academies/base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
  <h3>المساهمين</h3>
  <a class="btn btn-primary" href="{% url 'shareholder_create' %}">إضافة مساهم</a>
</div>
<form class="mb-3"><input class="form-control search-box w-half" name="q" value="{{ q }}" placeholder="بحث باسم المساهم أو الهاتف أو الرقم القومي"></form>
<div class="card p-3"><table class="table table-hover align-middle">
<tr><th>الاسم</th><th>الهاتف</th><th>الرقم القومي</th><th>النسبة</th><th></th></tr>
{% for s in shareholders %}<tr><td>{{ s.name }}</td><td>{{ s.phone }}</td><td>{{ s.national_id }}</td><td>{{ s.share_percentage }}%</td><td><a class="btn btn-sm btn-outline-primary" href="{% url 'shareholder_update' s.pk %}">تعديل</a> <a class="btn btn-sm btn-outline-danger" href="{% url 'shareholder_delete' s.pk %}">حذف</a></td></tr>{% empty %}<tr><td colspan="5">لا توجد بيانات</td></tr>{% endfor %}
</table></div>
{% endblock %}
