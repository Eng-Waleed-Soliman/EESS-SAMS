{% extends 'academies/base.html' %}
{% block content %}
<h3 class="mb-4">المصروفات العامة</h3>
<div class="row g-3">
  <div class="col-md-6">
    <div class="card p-4 h-100">
      <h4>مصروفات شهرية</h4>
      <p class="text-muted">إجمالي المصروفات الشهرية: <strong>{{ monthly_total }}</strong></p>
      <a class="btn btn-primary" href="{% url 'monthly_expense_list' %}">فتح المصروفات الشهرية</a>
    </div>
  </div>
  <div class="col-md-3"><a class="stat-link" href="{% url 'daily_expense_list' %}"><div class="card stat-card p-3"><b>المصروفات اليومية</b><h2>{{ daily_total }}</h2></div></a></div>
  <div class="col-md-3"><a class="stat-link" href="{% url 'operating_expense_list' %}"><div class="card stat-card p-3"><b>مصروفات التشغيل</b><h2>{{ operating_total }}</h2></div></a></div>
</div>
{% endblock %}
