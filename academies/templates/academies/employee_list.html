{% extends 'academies/base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
  <h3>الموظفين</h3>
  <a class="btn btn-primary" href="{% url 'employee_create' %}">إضافة موظف</a>
</div>
<form class="mb-3"><input class="form-control search-box w-half" name="q" value="{{ q }}" placeholder="بحث باسم الموظف أو الوظيفة أو الهاتف أو الرقم القومي"></form>
<div class="card p-3"><table class="table table-hover align-middle">
<tr><th>الاسم</th><th>الوظيفة</th><th>الهاتف</th><th>الرقم القومي</th><th>الراتب</th><th></th></tr>
{% for e in employees %}<tr><td>{{ e.name }}</td><td>{{ e.job_title }}</td><td>{{ e.phone }}</td><td>{{ e.national_id }}</td><td>{{ e.salary }}</td><td><a class="btn btn-sm btn-outline-primary" href="{% url 'employee_update' e.pk %}">تعديل</a> <a class="btn btn-sm btn-outline-danger" href="{% url 'employee_delete' e.pk %}">حذف</a></td></tr>{% empty %}<tr><td colspan="6">لا توجد بيانات</td></tr>{% endfor %}
</table></div>
{% endblock %}
