{% extends 'academies/base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
  <h3>مصروفات التشغيل</h3>
  <a class="btn btn-success" href="{% url 'operating_expense_create' %}">إضافة مصروف تشغيل</a>
</div>
<form class="mb-3"><input class="form-control search-box w-half" name="q" value="{{ q }}" placeholder="بحث في بيان المصروف أو الملاحظات"></form>
<div class="card p-3">
<table class="table table-hover align-middle"><tr><th>التاريخ</th><th>بيان المصروفات</th><th>القيمة</th><th>ملاحظات</th><th></th></tr>
{% for e in expenses %}<tr><td>{{ e.expense_date }}</td><td>{{ e.title }}</td><td>{{ e.amount }}</td><td>{{ e.notes }}</td><td><a class="btn btn-sm btn-outline-primary" href="{% url 'operating_expense_update' e.pk %}">تعديل</a> <a class="btn btn-sm btn-outline-danger" href="{% url 'operating_expense_delete' e.pk %}">حذف</a></td></tr>{% empty %}<tr><td colspan="5">لا توجد مصروفات تشغيل</td></tr>{% endfor %}
</table>
</div>
{% endblock %}
