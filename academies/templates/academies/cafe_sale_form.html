{% extends 'academies/base.html' %}
{% block content %}
<h3 class="mb-3">{{ title }}</h3>
<div class="card p-4">
  <form method="post">
    {% csrf_token %}
    {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}
    <div class="row">
      {% for field in form %}
      <div class="col-md-6 mb-3">
        <label class="form-label fw-bold">{{ field.label }}</label>
        {{ field }}
        <div class="text-danger small">{{ field.errors }}</div>
      </div>
      {% endfor %}
    </div>
    <button class="btn btn-success">حفظ</button>
    <a class="btn btn-secondary" href="{% url back_url %}">رجوع</a>
  </form>
</div>
{{ items|json_script:"items-data" }}
<script>
const rawItems = JSON.parse(document.getElementById('items-data').textContent);
const itemMap = {};
rawItems.forEach(function(obj){ itemMap[obj.id] = obj; });
const itemSelect = document.getElementById('id_item');
const priceInput = document.getElementById('id_unit_price');
function setSalePrice(){
  if(!itemSelect || !priceInput) return;
  const item = itemMap[itemSelect.value];
  if(item && (!priceInput.value || priceInput.value === '0')){
    priceInput.value = item.sale_price || 0;
  }
}
if(itemSelect){ itemSelect.addEventListener('change', function(){ priceInput.value=''; setSalePrice(); }); setSalePrice(); }
</script>
{% endblock %}
