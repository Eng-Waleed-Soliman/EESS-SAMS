<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول - SAMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    body{background:#f4f6f9;font-family:"Times New Roman", Times, serif;font-size:18px}
    .login-card{max-width:440px;margin:auto;border:0;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.12)}
    input,select,button{font-family:"Times New Roman", Times, serif;font-size:18px!important}
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center align-items-center" style="min-height:100vh">
    <div class="col-md-5">
      <div class="card login-card">
        <div class="card-body p-4">
          <h3 class="mb-1 text-center">SAMS</h3>
          <h5 class="mb-4 text-center text-muted">تسجيل الدخول إلى برنامج إدارة الأكاديميات</h5>
          {% if form.errors or login_error %}<div class="alert alert-danger">{{ login_error|default:'اسم المستخدم أو كلمة المرور غير صحيحة.' }}</div>{% endif %}
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">اسم المستخدم</label>
              <select name="username" class="form-select" required autofocus>
                <option value="">اختر اسم المستخدم</option>
                {% for u in users %}
                  <option value="{{ u.username }}">{{ u.username }}{% if u.get_full_name %} - {{ u.get_full_name }}{% endif %}</option>
                {% endfor %}
              </select>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <div class="mb-3">
              <label class="form-label">كلمة المرور</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button class="btn btn-primary w-100 py-2">دخول</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
