{% extends 'academies/base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-3"><h3>المصروفات اليومية</h3><div><a class="btn btn-secondary" href="{% url 'general_expenses_home' %}">رجوع للمصروفات العامة</a> <a class="btn btn-success" href="{% url 'daily_expense_create' %}">إضافة مصروف يومي</a></div></div>
<form class="mb-3"><input name="q" value="{{ q }}" class="form-control" placeholder="بحث"></form>
<div class="card p-3"><table class="table table-striped"><thead><tr><th>البيان</th><th>التاريخ</th><th>القيمة</th><th></th></tr></thead><tbody>{% for e in expenses %}<tr><td>{{ e.title }}</td><td>{{ e.expense_date }}</td><td>{{ e.amount }}</td><td><a class="btn btn-sm btn-primary" href="{% url 'daily_expense_update' e.pk %}">تعديل</a> <a class="btn btn-sm btn-danger" href="{% url 'daily_expense_delete' e.pk %}">حذف</a></td></tr>{% empty %}<tr><td colspan="4">لا توجد بيانات</td></tr>{% endfor %}</tbody></table></div>
{% endblock %}
