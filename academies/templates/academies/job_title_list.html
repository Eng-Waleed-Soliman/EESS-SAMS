{% extends 'academies/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h3>الوظائف المتاحة والمرتبات</h3><div><a class="btn btn-secondary" href="{% url 'settings_home' %}">الإعدادات</a> <a class="btn btn-success" href="{% url 'job_title_create' %}">إضافة وظيفة</a></div></div>
<form class="mb-3" method="get"><div class="input-group"><input class="form-control" name="q" value="{{ q }}" placeholder="بحث بالوظيفة"><button class="btn btn-primary">بحث</button></div></form>
<div class="card p-3"><table class="table table-striped"><thead><tr><th>الوظيفة</th><th>أساسي المرتب</th><th>ملاحظات</th><th></th></tr></thead><tbody>
{% for job in jobs %}<tr><td>{{ job.name }}</td><td>{{ job.base_salary }}</td><td>{{ job.notes }}</td><td><a class="btn btn-sm btn-primary" href="{% url 'job_title_update' job.pk %}">تعديل</a> <a class="btn btn-sm btn-danger" href="{% url 'job_title_delete' job.pk %}">حذف</a></td></tr>{% empty %}<tr><td colspan="4" class="text-center">لا توجد وظائف مسجلة</td></tr>{% endfor %}
</tbody></table></div>
{% endblock %}
