{% extends 'academies/base.html' %}
{% block content %}
<h3>{{ title }}</h3>
<div class="card p-4">
  <p>هل تريد حذف: <b>{{ object }}</b>؟</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">حذف</button>
    {% if back_url_path %}
    <a class="btn btn-secondary" href="{{ back_url_path }}">رجوع</a>
    {% else %}
    <a class="btn btn-secondary" href="{% url back_url %}">رجوع</a>
    {% endif %}
  </form>
</div>
{% endblock %}
